<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N1 動詞帳</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg: #f5f9f7;
    --card: #ffffff;
    --border: #dce8e1;
    --accent: #4a9d7c;
    --accent-light: #eaf5ef;
    --accent-dark: #357a5e;
    --text: #2d3a33;
    --text-light: #7a8f82;
    --kana: #2d3a33;
    --kanji: #3a8c6a;
    --meaning: #4a5650;
    --row1: #ffffff;
    --row2: #f4faf6;
    --danger: #d9534f;
  }

  body {
    font-family: 'Noto Sans SC', 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'PingFang SC', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 28px 18px 80px;
  }

  /* Header */
  header {
    text-align: center;
    padding-bottom: 20px;
    margin-bottom: 22px;
    border-bottom: 2px solid var(--accent);
  }
  header h1 {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 3px;
  }
  header .sub {
    font-size: 13px;
    color: var(--text-light);
    margin-top: 6px;
  }

  /* Search */
  .search-box {
    position: relative;
    margin-bottom: 12px;
  }
  .search-box input {
    width: 100%;
    padding: 11px 14px 11px 38px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    background: var(--card);
    outline: none;
    transition: border-color .2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box::before {
    content: "🔍";
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    opacity: .45;
  }

  /* Tags */
  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .tag-btn {
    padding: 5px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    font-size: 12px;
    color: var(--text-light);
    cursor: pointer;
    transition: all .15s;
    font-family: inherit;
  }
  .tag-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tag-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* Table */
  .table-wrap {
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--card);
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    padding: 13px 12px;
    text-align: left;
    font-weight: 600;
    font-size: 12px;
    color: var(--text-light);
    background: var(--accent-light);
    border-bottom: 2px solid var(--border);
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 2;
    letter-spacing: .5px;
  }
  thead th:first-child { width: 42px; text-align: center; }
  thead th:last-child { width: 40px; }
  tbody td {
    padding: 12px 12px;
    border-bottom: 1px solid #eef3f0;
    vertical-align: middle;
  }
  tbody tr:nth-child(even) { background: var(--row2); }
  tbody tr:hover { background: #e8f4ec; }

  .td-num { text-align: center; color: var(--text-light); font-size: 12px; font-weight: 500; }
  .td-kana {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
    font-size: 15.5px;
    color: var(--kana);
    letter-spacing: .3px;
    min-width: 100px;
  }
  .td-kanji {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 600;
    font-size: 15.5px;
    color: var(--kanji);
    min-width: 90px;
  }
  .td-kanji.empty { color: #ccc; font-weight: 400; }
  .td-meaning {
    color: var(--meaning);
    font-size: 13.5px;
    min-width: 140px;
  }
  .del-btn {
    background: none;
    border: none;
    color: #d0d0d0;
    font-size: 17px;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    line-height: 1;
    transition: color .15s;
  }
  .del-btn:hover { color: var(--danger); }

  .empty-msg {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-light);
    font-size: 14px;
  }

  /* Add Section */
  .add-section {
    margin-top: 22px;
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 16px 18px;
  }
  .add-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .add-toggle {
    background: none;
    border: none;
    color: var(--accent);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }
  .mode-switch { display: flex; gap: 4px; }
  .mode-btn {
    padding: 4px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--card);
    font-size: 12px;
    cursor: pointer;
    color: var(--text-light);
    font-family: inherit;
    transition: all .15s;
  }
  .mode-btn.active {
    background: var(--accent-light);
    color: var(--accent);
    border-color: var(--accent);
  }

  .add-form {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .form-row { display: flex; gap: 8px; }
  .form-input {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    outline: none;
    font-family: inherit;
    transition: border-color .2s;
  }
  .form-input:focus { border-color: var(--accent); }
  .submit-btn {
    padding: 10px 22px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
    transition: background .15s;
  }
  .submit-btn:hover { background: var(--accent-dark); }

  .bulk-hint { font-size: 12px; color: var(--text-light); }
  .bulk-area {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    resize: vertical;
    outline: none;
    min-height: 100px;
  }
  .bulk-area:focus { border-color: var(--accent); }

  .reset-btn {
    margin-top: 18px;
    background: none;
    border: none;
    color: #c0c0c0;
    font-size: 12px;
    cursor: pointer;
    display: block;
    text-align: center;
    width: 100%;
    padding: 10px;
    font-family: inherit;
    transition: color .15s;
  }
  .reset-btn:hover { color: var(--danger); }

  /* Toast */
  .toast {
    position: fixed;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: #fff;
    padding: 9px 28px;
    border-radius: 22px;
    font-size: 13px;
    font-weight: 500;
    z-index: 999;
    box-shadow: 0 4px 20px rgba(0,0,0,.12);
    opacity: 0;
    transition: opacity .25s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  .hidden { display: none !important; }

  /* Mobile tweaks */
  @media (max-width: 520px) {
    .container { padding: 18px 10px 60px; }
    .td-kana, .td-kanji { font-size: 14px; }
    .td-meaning { font-size: 12.5px; }
    thead th { padding: 10px 8px; font-size: 11px; }
    tbody td { padding: 10px 8px; }
  }
</style>
</head>

<div class="container">
  <div class="toast" id="toast"></div>

  <header>
    <h1>N1 動詞帳</h1>
    <p class="sub" id="counter"></p>
  </header>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="搜索假名、汉字或释义…">
  </div>
  <div class="tags" id="tagContainer"></div>

  <div class="table-wrap">
    <table>
      <thead>

    </table>
    <div class="empty-msg hidden" id="emptyMsg">没有找到匹配的单词</div>
  </div>

  <div class="add-section">
    <div class="add-header">
      <button class="add-toggle" id="addToggle">＋ 添加新单词</button>
      <div class="mode-switch hidden" id="modeSwitch">
        <button class="mode-btn active" id="modeSingle">逐条</button>
        <button class="mode-btn" id="modeBulk">批量</button>
      </div>
    </div>

    <div class="add-form hidden" id="singleForm">
      <div class="form-row">
        <input class="form-input" id="newKana" placeholder="假名 *">
        <input class="form-input" id="newKanji" placeholder="汉字（可空）">
      </div>
      <input class="form-input" id="newMeaning" placeholder="中文释义" style="width:100%">
      <div class="form-row">
        <input class="form-input" id="newTag" placeholder="分组标签" value="学习">
        <button class="submit-btn" id="addOneBtn">添加</button>
      </div>
    </div>

    <div class="add-form hidden" id="bulkForm">
      <p class="bulk-hint">每行一个，格式：假名，汉字，释义（用逗号或 Tab 分隔）</p>
      <textarea class="bulk-area" id="bulkText" placeholder="おしとおす，押し通す，坚持到底&#10;こなす，，完成处理"></textarea>
      <div class="form-row">
        <input class="form-input" id="bulkTag" placeholder="分组标签" value="学习">
        <button class="submit-btn" id="addBulkBtn">批量添加</button>
      </div>
    </div>
  </div>

  <button class="reset-btn" id="resetBtn">重置为初始数据</button>
</div>

const STORAGE_KEY = "n1_verb_list_v1";

// ─── STATE ───
let verbs = [];
let currentFilter = "all";
let currentSearch = "";
let addOpen = false;
let bulkMode = false;

function loadVerbs() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) { verbs = JSON.parse(saved); return; }
  } catch {}
  verbs = INITIAL.map((v, i) => ({
    id: "i" + i,
    kana: v[0], kanji: v[1], meaning: v[2], tag: v[3]
  }));
  saveVerbs();
}

function saveVerbs() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(verbs)); } catch {}
}

// ─── RENDER ───
function getTags() {
  const s = new Set();
  verbs.forEach(v => s.add(v.tag));
  return [...s];
}

function getFiltered() {
  return verbs.filter(v => {
    if (currentFilter !== "all" && v.tag !== currentFilter) return false;
    if (currentSearch) {
      const s = currentSearch.toLowerCase();
      return v.kana.includes(s) || v.kanji.includes(s) || v.meaning.includes(s);
    }
    return true;
  });
}

function render() {
  const filtered = getFiltered();
  const tags = getTags();

  // Counter
  document.getElementById("counter").textContent =
    `共 ${verbs.length} 词 · 筛选后 ${filtered.length} 词`;

  // Tags
  const tc = document.getElementById("tagContainer");
  tc.innerHTML = "";
  const allBtn = document.createElement("button");
  allBtn.className = "tag-btn" + (currentFilter === "all" ? " active" : "");
  allBtn.textContent = "全部";
  allBtn.onclick = () => { currentFilter = "all"; render(); };
  tc.appendChild(allBtn);
  tags.forEach(t => {
    const btn = document.createElement("button");
    btn.className = "tag-btn" + (currentFilter === t ? " active" : "");
    btn.textContent = t + " (" + verbs.filter(v => v.tag === t).length + ")";
    btn.onclick = () => { currentFilter = t; render(); };
    tc.appendChild(btn);
  });

  // Table
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  filtered.forEach((v, i) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="td-num">${i + 1}</td>
      <td class="td-kana">${esc(v.kana)}</td>
      <td class="td-kanji ${v.kanji ? '' : 'empty'}">${v.kanji ? esc(v.kanji) : '—'}</td>
      <td class="td-meaning">${esc(v.meaning)}</td>
      <td><button class="del-btn" title="删除">×</button></td>
    `;
    tr.querySelector(".del-btn").onclick = () => {
      verbs = verbs.filter(x => x.id !== v.id);
      saveVerbs();
      showToast("已删除");
      render();
    };
    tbody.appendChild(tr);
  });

  document.getElementById("emptyMsg").classList.toggle("hidden", filtered.length > 0);
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// ─── TOAST ───
let toastTimer;
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2000);
}

// ─── INIT ───
document.addEventListener("DOMContentLoaded", () => {
  loadVerbs();
  render();

  // Search
  document.getElementById("searchInput").addEventListener("input", e => {
    currentSearch = e.target.value;
    render();
  });

  // Add toggle
  document.getElementById("addToggle").addEventListener("click", () => {
    addOpen = !addOpen;
    document.getElementById("addToggle").textContent = addOpen ? "▾ 收起" : "＋ 添加新单词";
    document.getElementById("modeSwitch").classList.toggle("hidden", !addOpen);
    updateFormVisibility();
  });

  // Mode switch
  document.getElementById("modeSingle").addEventListener("click", () => {
    bulkMode = false;
    document.getElementById("modeSingle").classList.add("active");
    document.getElementById("modeBulk").classList.remove("active");
    updateFormVisibility();
  });
  document.getElementById("modeBulk").addEventListener("click", () => {
    bulkMode = true;
    document.getElementById("modeBulk").classList.add("active");
    document.getElementById("modeSingle").classList.remove("active");
    updateFormVisibility();
  });

  // Add single
  document.getElementById("addOneBtn").addEventListener("click", () => {
    const kana = document.getElementById("newKana").value.trim();
    if (!kana) return;
    verbs.push({
      id: "u" + Date.now(),
      kana,
      kanji: document.getElementById("newKanji").value.trim(),
      meaning: document.getElementById("newMeaning").value.trim(),
      tag: document.getElementById("newTag").value.trim() || "学习",
    });
    saveVerbs();
    document.getElementById("newKana").value = "";
    document.getElementById("newKanji").value = "";
    document.getElementById("newMeaning").value = "";
    showToast("已添加：" + kana);
    render();
  });

  // Add bulk
  document.getElementById("addBulkBtn").addEventListener("click", () => {
    const text = document.getElementById("bulkText").value.trim();
    if (!text) return;
    const tag = document.getElementById("bulkTag").value.trim() || "学习";
    const lines = text.split("\n").filter(l => l.trim());
    let count = 0;
    lines.forEach(line => {
      const parts = line.split(/[,，\t]/).map(s => s.trim());
      if (parts[0]) {
        verbs.push({
          id: "u" + Date.now() + Math.random(),
          kana: parts[0],
          kanji: parts[1] || "",
          meaning: parts[2] || "",
          tag,
        });
        count++;
      }
    });
    saveVerbs();
    document.getElementById("bulkText").value = "";
    showToast(`已添加 ${count} 个单词`);
    render();
  });

  // Reset
  document.getElementById("resetBtn").addEventListener("click", () => {
    if (!confirm("确定要重置为初始数据吗？所有自定义添加的单词将被删除。")) return;
    verbs = INITIAL.map((v, i) => ({
      id: "i" + i,
      kana: v[0], kanji: v[1], meaning: v[2], tag: v[3]
    }));
    saveVerbs();
    showToast("已重置");
    render();
  });
});

function updateFormVisibility() {
  document.getElementById("singleForm").classList.toggle("hidden", !addOpen || bulkMode);
  document.getElementById("bulkForm").classList.toggle("hidden", !addOpen || !bulkMode);
}
</script>
