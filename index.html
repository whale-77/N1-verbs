.rb{margin-left:auto;padding:5px 12px;border-radius:7px;border:1px solid var(--bdr);background:var(--card);font-size:11px;cursor:pointer;font-family:inherit;color:var(--tl);transition:.15s}
.rb:hover{border-color:var(--ac);color:var(--ac)}
.sb{position:relative;margin-bottom:10px}
.sb input{width:100%;padding:10px 14px 10px 36px;border:1px solid var(--bdr);border-radius:9px;font-size:13px;background:var(--card);outline:none;font-family:inherit}
.sb input:focus{border-color:var(--ac)}
.sb::before{content:"\1f50d";position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.4}
.tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px}
.tab{padding:4px 13px;border-radius:16px;border:1px solid var(--bdr);background:var(--card);font-size:11.5px;color:var(--tl);cursor:pointer;font-family:inherit;transition:.15s}
.tab:hover{border-color:var(--ac);color:var(--ac)}
.tab.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.tab.ft{border-color:var(--fv);color:var(--fv)}.tab.ft.on{background:var(--fv);color:#fff}
.grid{display:flex;flex-wrap:wrap;gap:9px}
.wc{background:var(--card);border:1px solid var(--bdr);border-radius:9px;padding:10px 11px 8px;position:relative;flex:0 0 auto;width:calc(20% - 8px);transition:box-shadow .15s}
.wc:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.wc .r{text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rk{font-family:'Noto Sans JP',sans-serif;font-size:12.5px;color:var(--kn);font-weight:500;margin-bottom:2px;letter-spacing:.2px}
.rj{font-family:'Noto Sans JP',sans-serif;font-size:15px;color:var(--kj);font-weight:700;margin-bottom:3px}
.rj.em{color:#ccc;font-weight:400}
.rm{font-size:11px;color:var(--mn);line-height:1.4;white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ch{position:relative;cursor:pointer}.ch .in{visibility:hidden}
.ch::after{content:"\00b7\00b7\00b7";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--hd);color:#a0a8b4;font-size:11px;border-radius:3px}
.ch.sh .in{visibility:visible}.ch.sh::after{display:none}
.fb{position:absolute;top:3px;right:5px;background:none;border:none;font-size:13px;cursor:pointer;opacity:.25;transition:.15s;padding:2px}
.fb:hover{opacity:.6}.fb.on{opacity:1;color:var(--fv)}
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:var(--ac);color:#fff;padding:7px 22px;border-radius:18px;font-size:12px;z-index:99;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
.em{text-align:center;padding:36px;color:var(--tl);font-size:13px;display:none}
@media(max-width:700px){.wc{width:calc(33.33% - 6px)}}
@media(max-width:480px){.wc{width:calc(50% - 5px)}.rk{font-size:11.5px}.rj{font-size:13.5px}.rm{font-size:10.5px}}
</style>
</head>
